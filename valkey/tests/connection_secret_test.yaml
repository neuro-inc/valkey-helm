suite: connection secret
templates:
  - templates/connection-secret.yaml
tests:
  - it: should render connection secret by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-valkey-connection-secret
      - equal:
          path: stringData.uri
          value: "redis://RELEASE-NAME-valkey:6379"

  - it: should render connection secret with explicit password
    set:
      connectionSecret:
        password: "explicitpw"
        includePassword: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.uri
          value: "redis://:explicitpw@RELEASE-NAME-valkey:6379"

  - it: should render master and replica secrets when replication is enabled
    set:
      replica.enabled: true
      replica.service.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-valkey-connection-secret
        documentIndex: 0
      - equal:
          path: stringData.uri
          value: "redis://RELEASE-NAME-valkey:6379"
        documentIndex: 0
      - isKind:
          of: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-valkey-connection-secret-replica
        documentIndex: 1
      - equal:
          path: stringData.uri
          value: "redis://RELEASE-NAME-valkey-0.RELEASE-NAME-valkey-headless:6379"
        documentIndex: 1
      - equal:
          path: stringData.uris.json
          value: "[\"redis://RELEASE-NAME-valkey-0.RELEASE-NAME-valkey-headless:6379\"]"
        documentIndex: 1
