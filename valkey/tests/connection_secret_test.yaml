suite: connection secret
templates:
  - templates/connection-secret.yaml
tests:
  - it: should render connection secret by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: valkey-connection-secret
      - equal:
          path: stringData.uri
          value: redis://RELEASE-NAME-valkey:6379

  - it: should render connection secret with explicit password
    set:
      connectionSecret:
        password: "explicitpw"
        includePassword: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.uri
          value: redis://:explicitpw@RELEASE-NAME-valkey:6379
