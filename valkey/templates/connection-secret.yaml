{{- $hasInline := (include "valkey.hasInlinePasswords" . | eq "true") -}}
{{- $shouldCreate := or .Values.connectionSecret.create (and .Values.auth.enabled $hasInline) .Values.connectionSecret.password -}}
{{- if $shouldCreate -}}
  {{- $password := "" -}}
  {{- if and .Values.connectionSecret.includePassword .Values.connectionSecret.password -}}
    {{- $password = .Values.connectionSecret.password -}}
  {{- else if and .Values.connectionSecret.includePassword (and .Values.auth.enabled $hasInline) -}}
    {{- $pw := index .Values.auth.aclUsers "default" | default dict -}}
    {{- $password = $pw.password | default "" -}}
  {{- end -}}

  apiVersion: v1
  kind: Secret
  metadata:
    name: {{- if .Values.connectionSecret.name }}{{ .Values.connectionSecret.name }}{{- else }}{{ include "valkey.fullname" . }}-connection{{- end }}
    labels:
      {{- include "valkey.labels" . | nindent 6 }}
  type: Opaque
  stringData:
    uri: |
      {{- $release := include "valkey.fullname" . -}}
      {{- $port := .Values.service.port | default 6379 -}}
      redis://:{{ $password }}@{{ $release }}:{{ $port }}
{{- end -}}
