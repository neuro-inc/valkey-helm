{{- $hasInline := (include "valkey.hasInlinePasswords" . | eq "true") -}}
{{- $conn := default dict .Values.connectionSecret -}}
{{- $connCreate := default false $conn.create -}}
{{- $connPassword := default "" $conn.password -}}
{{- $connInclude := default true $conn.includePassword -}}
{{- $shouldCreate := or $connCreate (and .Values.auth.enabled $hasInline) (ne $connPassword "") -}}
{{- if $shouldCreate -}}
  {{- $password := "" -}}
  {{- if and $connInclude (ne $connPassword "") -}}
    {{- $password = $connPassword -}}
  {{- else if and $connInclude (and .Values.auth.enabled $hasInline) -}}
    {{- $pw := index .Values.auth.aclUsers "default" | default dict -}}
    {{- $password = $pw.password | default "" -}}
  {{- end -}}

  apiVersion: v1
  kind: Secret
  metadata:
    name: "valkey-connection-secret"
    labels:
      {{- include "valkey.labels" . | nindent 6 }}
  type: Opaque
  stringData:
    uri: |
      {{- $release := include "valkey.fullname" . -}}
      {{- $port := .Values.service.port | default 6379 -}}
      redis://:{{ $password }}@{{ $release }}:{{ $port }}
{{- end -}}
