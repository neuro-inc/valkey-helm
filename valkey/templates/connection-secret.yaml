{{- $hasInline := (include "valkey.hasInlinePasswords" . | eq "true") -}}
{{- $conn := default dict .Values.connectionSecret -}}
{{- $connPassword := default "" $conn.password -}}
{{- $connInclude := default true $conn.includePassword -}}
{{- $release := include "valkey.fullname" . -}}
{{- $port := .Values.service.port | default 6379 -}}

{{- $password := "" -}}
{{- if and $connInclude (ne $connPassword "") -}}
  {{- $password = $connPassword -}}
{{- else if and $connInclude .Values.auth.enabled $hasInline -}}
  {{- $pw := index .Values.auth.aclUsers "default" | default dict -}}
  {{- $password = $pw.password | default "" -}}
{{- end -}}

{{- define "valkey.buildUri" -}}
{{- $host := index . 0 -}}
{{- $port := (index . 1 | int) -}}
{{- $password := index . 2 -}}
{{- if $password -}}
{{- printf "redis://:%s@%s:%d" $password $host $port -}}
{{- else -}}
{{- printf "redis://%s:%d" $host $port -}}
{{- end -}}
{{- end -}}

---
# Primary Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey.connectionSecretName" . | quote }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
type: Opaque
stringData:
  uri: {{ include "valkey.buildUri" (list $release $port $password) | quote }}

---
# Replica Secret (conditionally rendered)
{{- if and .Values.replica.enabled .Values.replica.service.enabled -}}

{{- $replicaCount := (.Values.replica.replicaCount | default 1) | int -}}
{{- $headless := printf "%s-headless" $release -}}
{{- $uris := list -}}

{{- range $i := until $replicaCount }}
  {{- $host := printf "%s-%d.%s" $release $i $headless -}}
  {{- $uri := include "valkey.buildUri" (list $host $port $password) -}}
  {{- $uris = append $uris $uri -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey.connectionSecretReplicaName" . | quote }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
type: Opaque
stringData:
  uri: {{ join "," $uris | quote }}
{{- end -}}
