apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-connect-test
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: redis-cli
          image: redis:7-alpine
          env:
            - name: CONNECTION_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "valkey.connectionSecretName" . | quote }}
                  key: uri
            - name: CONNECTION_URI_REPLICA
              valueFrom:
                secretKeyRef:
                  name: {{ include "valkey.connectionSecretReplicaName" . | quote }}
                  key: uri
                  optional: true
          command:
            - sh
            - -c
            - |
              set -e

              trim() {
                echo "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
              }

              # --- Primary check ---
              URI="$(trim "$CONNECTION_URI")"
              echo "Checking primary URI: $URI"
              redis-cli -u "$URI" PING || (echo "Primary redis PING failed" && exit 1)

              # --- Replica check (comma-separated only) ---
              if [ -z "$CONNECTION_URI_REPLICA" ]; then
                echo "Replica connection secret not found, falling back to primary"
              else
                echo "Using replica connection secret"
                CONNECTION_URI="$CONNECTION_URI_REPLICA"
                RAW="$(trim "$CONNECTION_URI_REPLICA")"
                IFS=','
                for uri in $RAW; do
                  uri="$(trim "$uri")"
                  [ -z "$uri" ] && continue
                  echo "Checking replica URI: $uri"
                  redis-cli -u "$uri" PING || (echo "Replica redis PING failed for $uri" && exit 1)
                done
                unset IFS
              fi
